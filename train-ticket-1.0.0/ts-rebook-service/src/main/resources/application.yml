# HTTP Server
server:
  port: 18886  # HTTP (Tomcat) port

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDRS:nacos-0.nacos-headless.default.svc.cluster.local,nacos-1.nacos-headless.default.svc.cluster.local,nacos-2.nacos-headless.default.svc.cluster.local}
  application:
    name: ts-rebook-service
swagger:
  controllerPackage: rebook.controller

# [RESILIENCE-CONFIG] Added for fault tolerance testing - INTENTIONALLY FLAWED
resilience4j:
  retry:
    instances:
      orderService:
        maxAttempts: 5
        waitDuration: 0ms
        # WARNING: No exponential backoff, no timeout, no circuit breaker
