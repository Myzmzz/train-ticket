# HTTP Server
server:
  port: 18886  # HTTP (Tomcat) port

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDRS:nacos-0.nacos-headless.default.svc.cluster.local,nacos-1.nacos-headless.default.svc.cluster.local,nacos-2.nacos-headless.default.svc.cluster.local}
  application:
    name: ts-rebook-service
swagger:
  controllerPackage: rebook.controller

# [RESILIENCE-CONFIG] Added for fault tolerance testing
resilience4j:
  retry:
    instances:
      orderService:
        maxAttempts: 5
        waitDuration: 0ms
        # WARNING: No exponential backoff, no timeout, no circuit breaker
      paymentRetry:
        maxRetryAttempts: 2
        waitDuration: 500ms
  circuitbreaker:
    instances:
      paymentCB:
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 3s
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        waitDurationInOpenState: 15s
  timelimiter:
    instances:
      paymentTimeLimiter:
        timeoutDuration: 5s
      travelTimeLimiter:
        timeoutDuration: 5s
