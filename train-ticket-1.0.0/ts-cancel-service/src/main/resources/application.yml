server:
  port: 18885  # HTTP (Tomcat) port

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDRS:nacos-0.nacos-headless.default.svc.cluster.local,nacos-1.nacos-headless.default.svc.cluster.local,nacos-2.nacos-headless.default.svc.cluster.local}
  application:
    name: ts-cancel-service

swagger:
  controllerPackage: cancel.controller

# [RESILIENCE-CONFIG] Added for fault tolerance testing
resilience4j:
  retry:
    instances:
      cancelOrderRetry:
        maxRetryAttempts: 2
        waitDuration: 300ms
      insidePaymentService:
        maxRetryAttempts: 2
        waitDuration: 500ms
  circuitbreaker:
    instances:
      insidePaymentService:
        failureRateThreshold: 60
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
      cancelPaymentCB:
        failureRateThreshold: 50
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 20s
  timelimiter:
    instances:
      cancelOrderTimeout:
        timeoutDuration: 10s
      cancelPaymentTimeout:
        timeoutDuration: 5s
  bulkhead:
    instances:
      insidePaymentService:
        maxConcurrentCalls: 5
