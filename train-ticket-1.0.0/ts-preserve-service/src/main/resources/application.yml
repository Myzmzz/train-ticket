# HTTP Server
server:
  port: 14568  # HTTP (Tomcat) port

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDRS:nacos-0.nacos-headless.default.svc.cluster.local,nacos-1.nacos-headless.default.svc.cluster.local,nacos-2.nacos-headless.default.svc.cluster.local}
  application:
    name: ts-preserve-service
  rabbitmq:
    host: ${rabbitmq_host:localhost}
    port: 5672

swagger:
  controllerPackage: preserve.controller

# [RESILIENCE-CONFIG] Added for fault tolerance testing - INTENTIONALLY FLAWED
resilience4j:
  retry:
    instances:
      orderService:
        maxAttempts: 5
        waitDuration: 0ms
        # WARNING: No exponential backoff - will hammer downstream service
      seatService:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      seatService:
        timeoutDuration: 5s
      # NOTE: No timeout for orderService - intentionally missing
  # NOTE: No circuitbreaker configured - intentionally missing
  # NOTE: No bulkhead configured - intentionally missing
