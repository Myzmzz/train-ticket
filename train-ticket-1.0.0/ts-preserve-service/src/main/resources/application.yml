# HTTP Server
server:
  port: 14568  # HTTP (Tomcat) port

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDRS:nacos-0.nacos-headless.default.svc.cluster.local,nacos-1.nacos-headless.default.svc.cluster.local,nacos-2.nacos-headless.default.svc.cluster.local}
  application:
    name: ts-preserve-service
  rabbitmq:
    host: ${rabbitmq_host:localhost}
    port: 5672

swagger:
  controllerPackage: preserve.controller

# [RESILIENCE-CONFIG] V3: Differentiated fault tolerance - INTENTIONALLY FLAWED CB
resilience4j:
  retry:
    instances:
      orderRetry:
        maxRetryAttempts: 3
        waitDuration: 200ms
        retryExceptions:
          - java.lang.Exception
      seatService:
        maxAttempts: 3
        waitDuration: 500ms
  circuitbreaker:
    instances:
      orderCB:
        failureRateThreshold: 80
        slowCallRateThreshold: 95
        slowCallDurationThreshold: 10s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      orderTimeLimiter:
        timeoutDuration: 15s
      seatTimeLimiter:
        timeoutDuration: 5s
      basicTimeLimiter:
        timeoutDuration: 3s
