## ============================================================
## Java Services with OpenTelemetry Java Agent
## ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-admin-basic-info-service
  namespace: train-ticket
spec:
  selector:
    matchLabels:
      app: ts-admin-basic-info-service
  replicas: 1
  template:
    metadata:
      labels:
        app: ts-admin-basic-info-service
    spec:
      containers:
        - name: ts-admin-basic-info-service
          image: 1.94.151.57:85/train-ticket/ts-admin-basic-info-service:1.0.0
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: opentelemetry-javaagent
              mountPath: /opt/opentelemetry-javaagent
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_SERVICE_NAME
              value: "ts-admin-basic-info-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://coroot-coroot.coroot:8080"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_JAVAAGENT_LOGGING
              value: "application"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UnlockDiagnosticVMOptions -XX:+DebugNonSafepoints -javaagent:/opt/opentelemetry-javaagent/opentelemetry-javaagent.jar"
          envFrom:
            - configMapRef:
                name: nacos
          ports:
            - containerPort: 18767
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 1500m
              memory: 1500Mi
          readinessProbe:
            tcpSocket:
              port: 18767
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: opentelemetry-javaagent
          nfs:
            server: 1.94.151.57
            path: /data/share
---
