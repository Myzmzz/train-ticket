# HTTP Server
server:
  port: 12031  # HTTP (Tomcat) port

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDRS:127.0.0.1:8848}
  application:
    name: ts-order-service
  datasource:
    url: jdbc:mysql://${ORDER_MYSQL_HOST:10.176.122.1}:${ORDER_MYSQL_PORT:3306}/${ORDER_MYSQL_DATABASE:ts}?useSSL=false
    username: ${ORDER_MYSQL_USER:root}
    password: ${ORDER_MYSQL_PASSWORD:Abcd1234#}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL5Dialect

swagger:
  controllerPackage: order.controller

# [RESILIENCE-CONFIG] Added for fault tolerance testing - INTENTIONALLY FLAWED
resilience4j:
  retry:
    instances:
      stationService:
        maxAttempts: 2
        waitDuration: 300ms
  circuitbreaker:
    instances:
      stationService:
        failureRateThreshold: 90
        # WARNING: 90% threshold means circuit breaker almost never trips
        slidingWindowSize: 10
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      stationService:
        timeoutDuration: 3s
  # NOTE: No bulkhead - intentionally missing